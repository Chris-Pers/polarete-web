name: Sync brand from polarete

on:
  schedule:
    # Daily at 02:00 UTC (~04:00 PL time during summer)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allows manual trigger from Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout polarete-web
        uses: actions/checkout@v4

      - name: Clone polarete (source of brand)
        env:
          POLARETE_SYNC_PAT: ${{ secrets.POLARETE_SYNC_PAT }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:${POLARETE_SYNC_PAT}@github.com/Chris-Pers/polarete.git" \
            /tmp/polarete

      - name: Sync brand tokens (globals.css)
        run: |
          mkdir -p src/app
          cp /tmp/polarete/apps/landing/src/app/globals.css src/app/globals.css

      - name: Sync logos and favicons
        run: |
          mkdir -p public
          cp /tmp/polarete/apps/landing/public/polarete-mark.svg public/polarete-mark.svg
          cp /tmp/polarete/apps/landing/public/polarete-favicon.svg public/polarete-favicon.svg

      - name: Sync brand catalog (showcase HTML + source SVG + logo variants)
        run: |
          mkdir -p brand
          rsync -av --delete \
            --exclude='node_modules' --exclude='.git' \
            /tmp/polarete/brand/ brand/

      - name: Capture polarete commit metadata
        id: meta
        run: |
          cd /tmp/polarete
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --format='%s' | head -c 200)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ai')" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No brand changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(brand): sync from polarete @ ${{ steps.meta.outputs.sha }}

            Source commit: ${{ steps.meta.outputs.sha }} (${{ steps.meta.outputs.date }})
            Last message: ${{ steps.meta.outputs.msg }}
          branch: chore/brand-sync
          delete-branch: true
          title: 'chore(brand): sync from polarete @ ${{ steps.meta.outputs.sha }}'
          body: |
            🎨 **Auto-sync brand tokens from polarete monorepo.**

            **Source commit:** [`${{ steps.meta.outputs.sha }}`](https://github.com/Chris-Pers/polarete/commit/${{ steps.meta.outputs.sha }}) (${{ steps.meta.outputs.date }})

            **Last commit message:**
            > ${{ steps.meta.outputs.msg }}

            ## Synced

            - `src/app/globals.css` — brand tokens (`@theme` variables, dark mode override, scrollbar styling)
            - `public/polarete-mark.svg` — logo mark
            - `public/polarete-favicon.svg` — favicon
            - `brand/` — full brand catalog (showcase HTML + logo variants + source SVG)

            ## How to use

            - **Review diff** below to see what changed in polarete brand
            - **Approve & merge** to apply changes here
            - **Reject** if breaking change (and open issue in polarete to discuss)

            ---
            🤖 Generated by [.github/workflows/sync-brand.yml](.github/workflows/sync-brand.yml). Runs daily at 02:00 UTC.
          labels: |
            chore
            brand
            automated
